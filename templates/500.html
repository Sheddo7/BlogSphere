<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — BlogSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #c0392b; }
        body {
            font-family: Georgia, serif;
            background: #fafaf8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: .8;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #111;
        }
        .error-text {
            color: #666;
            max-width: 480px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        .btn-home {
            background: #111;
            color: #fff;
            padding: .75rem 2rem;
            border-radius: 2px;
            text-decoration: none;
            font-weight: 700;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            transition: background .18s;
        }
        .btn-home:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div>
        <div class="error-code">500</div>
        <h1 class="error-title">Something went wrong</h1>
        <p class="error-text">
            We're experiencing a technical issue on our end.
            Our team has been notified. Please try again in a few minutes.
        </p>
        <a href="/" class="btn-home">← Back to Home</a>
    </div>
</body>
</html>
